# Optional containerized orchestration for platform core services.
# The default local path is start-local.sh (not this file).
#
# External subsystems (NOT started by this compose — sibling repos):
#   TaskView  ../TaskView   web :5174  API :1401
#   Superset  ../superset   UI  :9060  API :9068  (local_home/start-all.sh)
# Configure their URLs in gateway/config.yaml (subsystems.taskview / subsystems.superset).
version: "3.8"

services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - gateway
    networks:
      - aiplatform

  gateway:
    build: ./gateway
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=mysql://aiplatform:aiplatform@mysql:3306/aiplatform
      - REDIS_URL=redis://redis:6379
    # Mount or bake gateway/config.yaml with TaskView/Superset/BuildingAI/OpenCode URLs.
    depends_on:
      - keycloak
      - mysql
      - redis
    networks:
      - aiplatform

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command:
      - start-dev
      - --import-realm
      - --hostname=http://localhost:8080
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: dev-file
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-import.json:/opt/keycloak/data/import/realm-import.json:ro
      - ./keycloak/themes:/opt/keycloak/themes:ro
    networks:
      - aiplatform

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: aiplatform
      MYSQL_USER: aiplatform
      MYSQL_PASSWORD: aiplatform
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - aiplatform

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    networks:
      - aiplatform

  opencode:
    image: opencode:latest
    ports:
      - "4096:4096"
    environment:
      - OPENCODE_SERVER_PASSWORD=opencode
    networks:
      - aiplatform

  buildingai:
    # Placeholder: replace with actual BuildingAI service definition
    build: ../buildingAI
    ports:
      - "4091:4091"
    environment:
      - DATABASE_URL=mysql://aiplatform:aiplatform@mysql:3306/buildingai
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mysql
      - redis
    networks:
      - aiplatform

volumes:
  mysql_data:

networks:
  aiplatform:
    driver: bridge
